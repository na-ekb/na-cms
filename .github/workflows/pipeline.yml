name: Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── 1. Gitleaks: scan for leaked secrets ─────────────────────────────────
  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 2. Build: PHP deps + frontend assets ─────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql, zip, gd, intl
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Composer install
        run: composer install --no-interaction --no-dev --prefer-dist --no-scripts
        env:
          COMPOSER_AUTH: >-
            {
              "github-oauth": {"github.com": "${{ secrets.OC_PACKAGES_TOKEN }}"},
              "bearer": {"raw.githubusercontent.com": "${{ secrets.OC_PACKAGES_TOKEN }}"}
            }

      - name: Composer dump-autoload
        run: composer dump-autoload --no-interaction --no-scripts --optimize

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm install
        run: npm ci

      - name: Composer audit
        run: composer audit
        continue-on-error: true
        env:
          COMPOSER_AUTH: >-
            {
              "github-oauth": {"github.com": "${{ secrets.OC_PACKAGES_TOKEN }}"},
              "bearer": {"raw.githubusercontent.com": "${{ secrets.OC_PACKAGES_TOKEN }}"}
            }

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build assets
        run: npm run production
